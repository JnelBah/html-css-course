<!DOCTYPE html>
<html>
  <head>

    <title>MinePro</title>
    <link rel="img" href="img.html">
    <style>
      .minepro-1{
        width:50px;
        height:50px;
        border-radius: 70px;
        margin-left: 20px;
        margin-top: 20px;
        margin-right:30px;
        border-color:gold;
        border-width: 2px;
        border-style:solid;
        display: inline-block;
      }

      .home, .features, .modules, .study-guide, .contact-us{
        background-color:transparent;
        color:rgb(114, 111, 111);
        border:none;
        cursor:pointer;
        font-size:12px;
        font-weight:bold;
        margin-left:3px;
        margin-right:1px;
        margin-top:3px;
        border-radius: 10px;
        transition: opacity 0.15s;
        padding-bottom: 5px;
        padding-top: 5px;
        padding-right: 5px;
        padding-left: 5px;
        vertical-align: top;
        transition: padding 0.15s;
        
      }
      .home:hover, .features:hover, .modules:hover, .study-guide:hover, .contact-us:hover{
        opacity:0.8;
        color:rgb(114, 111, 111);
        
      }

      .home:active, .features:active, .modules:active, .study-guide:active, .contact-us:active{
        opacity:0.5;
      }

      .navbar{
        display: flex;
        align-items: center;
        background-color:rgb(248, 248, 248);
        border-bottom: 2px solid rgb(54, 53, 49);
      }
      .minepro-center{
        text-align: left;
        margin-left: 20px;
        margin-bottom: 10px;
        font-size: 36px;
        font-weight: bold;
        width: 400px;
        display: flex;
        flex-wrap: wrap;

      }
      .motto{
        text-align: left;
        margin-left: 20px;
        margin-top: 10px;
        font-size: 20px;
        font-style: italic;
        width:350px;
        color: rgb(102, 102, 100);
        display: flex center;
        flex-wrap: wrap;
      }

      .logo1{
        position: absolute;
        top: 110px;
        left: 600px;
        border: 2px solid gold;
        vertical-align: right;
        display: flex;
       
      }

      .logo2{
        position: absolute;
        top: 160px;
        left: 520px;
        border: 2px solid gold;
        vertical-align: right;
        display: flex;
        
      } 

      .logo3{
        position: absolute;
        top: 210px;
        left: 440px;
        border: 2px solid gold;
        display: flex;
      }

      
    </style>

  </head>

  <body>
    <!--NAVBAR-->
    <div class="navbar">

      <div class="logo">
    <img class="minepro-1" src="minepro-1.jpg" alt="MinePro">
    </div>

      <div class="home">
    <button class="home">Home</button>
    </div>

    <div class="features">
    <button class="features">Features</button>
    </div>

    <div class="modules">
      <button class="modules">Modules</button>
    </div>

    <div class="study-guide">
      <button class="study-guide">Study Guide</button>
    </div>

    <div class="contact-us">
      <button class="contact-us">Contact Us</button>
    </div>
    </div>

    <!--HERO-->
    <div class="hero">
    <h1 class="minepro-center">MINEPRO TUTORIA CENTER</h1>
    <h2 class="motto">Dig Deeper, Learn Smarter, Mine Better.</h2>
    </div>

    <!--FLOATING LOGOS-->
      <section class="logos">
        <div class="logo-container">
        <img class="logo1" src="FBC.png" width="80">
        <img class="logo2" src="mining-logo1.png" width="80">
        <img class="logo3" src="minepro-1.jpg" width="80" height="80">
    </div>
      </section>

      <!--CONTENT-->
      <div class="container">
  </body>
</html>
